<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelioCentric - Stage 5</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <div id="gameOver" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-family: monospace; font-size: 48px; text-transform: uppercase;">Game Over</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfffff0, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Starry background
        const starsGeo = new THREE.BufferGeometry();
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
        const starsVertices = [];
        for (let i = 0; i < 2000; i++) {
            starsVertices.push(
                (Math.random() - 0.5) * 400,
                (Math.random() - 0.5) * 400,
                (Math.random() - 0.5) * 400
            );
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // UFO Group
        const ufoGroup = new THREE.Group();
        
        // UFO Disc
        const discGeo = new THREE.SphereGeometry(0.8, 32, 16);
        discGeo.scale(1, 0.3, 1);
        const discMat = new THREE.MeshPhongMaterial({ color: 0x44aaff, flatShading: true });
        const disc = new THREE.Mesh(discGeo, discMat);
        
        // UFO Dome
        const domeGeo = new THREE.SphereGeometry(0.4, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const domeMat = new THREE.MeshPhongMaterial({ color: 0xaaffff, transparent: true, opacity: 0.8 });
        const dome = new THREE.Mesh(domeGeo, domeMat);
        dome.position.y = 0.1;
        
        ufoGroup.add(disc);
        ufoGroup.add(dome);
        scene.add(ufoGroup);

        // Grid (to give sense of movement)
        const gridHelper = new THREE.GridHelper(200, 40, 0x444444, 0x222222);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // Game Configuration
        const LANE_WIDTH = 3;
        let MOVEMENT_SPEED = 20; // Units per second forward
        let currentLane = 0; // -1 = Left, 0 = Center, 1 = Right
        let ufoZPos = 0;
        let isGameOver = false;

        // Jump Configuration
        let isJumping = false;
        let ufoVelocityY = 0;
        const JUMP_FORCE = 12;
        const GRAVITY = -30;
        const UFO_BASE_Y = 0;

        // Environment System (Planets)
        const planets = [
            { name: "Pluto", distance: 0, bgColor: 0x050510, objColor: 0xaaaaaa, mesh: null },
            { name: "Neptune", distance: 1000, bgColor: 0x000033, objColor: 0x2244ff, mesh: null },
            { name: "Uranus", distance: 2000, bgColor: 0x001133, objColor: 0x44ffff, mesh: null },
            { name: "Saturn", distance: 3000, bgColor: 0x1a1500, objColor: 0xddaa55, mesh: null },
            { name: "Jupiter", distance: 4000, bgColor: 0x221100, objColor: 0xffaa88, mesh: null },
            { name: "Mars", distance: 5000, bgColor: 0x330500, objColor: 0xff3300, mesh: null },
            { name: "Earth", distance: 6000, bgColor: 0x001144, objColor: 0x0088ff, mesh: null },
            { name: "Venus", distance: 7000, bgColor: 0x332200, objColor: 0xffcc44, mesh: null },
            { name: "Mercury", distance: 8000, bgColor: 0x222222, objColor: 0x999999, mesh: null },
            { name: "Sun", distance: 9000, bgColor: 0x551100, objColor: 0xffff00, mesh: null }
        ];
        let currentPlanetIndex = 0;

        // Create representative planet meshes in the background
        const planetGroup = new THREE.Group();
        planets.forEach((p, index) => {
            const geo = new THREE.SphereGeometry(20, 32, 32);
            let mat;
            if (p.name === "Sun") mat = new THREE.MeshBasicMaterial({ color: p.objColor });
            else mat = new THREE.MeshPhongMaterial({ color: p.objColor });
            
            const mesh = new THREE.Mesh(geo, mat);
            // Position them far ahead and off to the side, based on their distance
            mesh.position.set(40 * (index % 2 === 0 ? 1 : -1), 20, -p.distance - 500);
            
            p.mesh = mesh;
            planetGroup.add(mesh);
        });
        scene.add(planetGroup);

        // Obstacles
        const obstacles = [];
        const obstacleGeo = new THREE.DodecahedronGeometry(0.8);
        const obstacleMat = new THREE.MeshPhongMaterial({ color: 0x888888, flatShading: true });
        
        // Hazards (Black holes that require jumping)
        const hazards = [];
        const hazardGeo = new THREE.RingGeometry(1.5, 2, 32);
        const hazardCoreGeo = new THREE.CircleGeometry(1.5, 32);
        const hazardMat = new THREE.MeshBasicMaterial({ color: 0x8800ff, side: THREE.DoubleSide });
        const hazardCoreMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });
        
        // Spawn timer
        let nextObstacleZ = -30; // Start spawning shortly ahead
        const obstacleSpacing = 15; // Space between obstacle groups

        // Camera Offset
        const camOffset = new THREE.Vector3(0, 3, 6);

        // Input
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                if (currentLane > -1) currentLane--;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                if (currentLane < 1) currentLane++;
            } else if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                if (!isJumping) {
                    isJumping = true;
                    ufoVelocityY = JUMP_FORCE;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) return; // Stop rendering updates if game is over

            const delta = clock.getDelta();

            // Increase speed slowly
            MOVEMENT_SPEED += delta * 0.5;

            // Forward movement
            ufoZPos -= MOVEMENT_SPEED * delta;
            ufoGroup.position.z = ufoZPos;

            // Environment Update based on Distance
            const dist = -ufoZPos;
            
            // Check if we need to advance the current planet zone
            if (currentPlanetIndex < planets.length - 1 && dist >= planets[currentPlanetIndex + 1].distance) {
                currentPlanetIndex++;
            }
            
            // Interpolate colors between current and next planet zone
            const pCurrent = planets[currentPlanetIndex];
            const pNext = planets[Math.min(currentPlanetIndex + 1, planets.length - 1)];
            
            let t = 0;
            if (pNext.distance > pCurrent.distance) {
                t = (dist - pCurrent.distance) / (pNext.distance - pCurrent.distance);
                t = Math.max(0, Math.min(1, t)); // Clamp 0 to 1
            }
            
            const currentColor = new THREE.Color(pCurrent.bgColor);
            const nextColor = new THREE.Color(pNext.bgColor);
            currentColor.lerp(nextColor, t);
            
            scene.fog.color.copy(currentColor);
            scene.background = currentColor;

            // Update UI Score
            document.getElementById('ui').innerHTML = `Score: ${Math.floor(dist)}<br>Speed: ${Math.floor(MOVEMENT_SPEED)}<br>Zone: ${pCurrent.name}`;

            // Lane switching (smooth targeting)
            const targetX = currentLane * LANE_WIDTH;
            ufoGroup.position.x += (targetX - ufoGroup.position.x) * 10 * delta;

            // Jumping logic
            if (isJumping) {
                ufoGroup.position.y += ufoVelocityY * delta;
                ufoVelocityY += GRAVITY * delta;

                if (ufoGroup.position.y <= UFO_BASE_Y) {
                    ufoGroup.position.y = UFO_BASE_Y;
                    isJumping = false;
                    ufoVelocityY = 0;
                }
            }

            // Obstacle spawning
            if (ufoZPos < nextObstacleZ + 100) { // Keep them spawning ahead
                const lane = Math.floor(Math.random() * 3) - 1; // -1, 0, or 1
                
                // Randomly choose between obstacle (needs dodging) and hazard (needs jumping)
                if (Math.random() > 0.3) {
                    // Update material based on current zone
                    obstacleMat.color.setHex(pCurrent.objColor);

                    // Spawn Obstacle
                    const obsMesh = new THREE.Mesh(obstacleGeo, obstacleMat.clone()); // Clone to maintain colors in case of transition
                    obsMesh.position.set(lane * LANE_WIDTH, 0, nextObstacleZ);
                    obsMesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    
                    scene.add(obsMesh);
                    obstacles.push(obsMesh);
                } else {
                    // Spawn Hazard
                    const hazardGroup = new THREE.Group();
                    const ring = new THREE.Mesh(hazardGeo, hazardMat);
                    const core = new THREE.Mesh(hazardCoreGeo, hazardCoreMat);
                    hazardGroup.add(ring);
                    hazardGroup.add(core);
                    
                    hazardGroup.rotation.x = -Math.PI / 2; // Lay flat on the ground
                    hazardGroup.position.set(lane * LANE_WIDTH, -0.7, nextObstacleZ);
                    
                    scene.add(hazardGroup);
                    hazards.push(hazardGroup);
                }
                
                nextObstacleZ -= obstacleSpacing; // Next spawn point further down Z
            }

            // Obstacle logic & collision
            const collideDist = 1.2; // roughly ufoRadius + obstacleRadius
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                
                // Rotate obstacle for flavor
                obs.rotation.x += delta;
                obs.rotation.y += delta;
                
                // Simple distance checking for collision
                if (ufoGroup.position.distanceTo(obs.position) < collideDist) {
                    isGameOver = true;
                    document.getElementById('gameOver').style.display = 'block';
                }

                // Cleanup passed obstacles to save memory
                if (obs.position.z > ufoZPos + 20) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            // Hazard logic & collision (Black holes)
            const hazardCollideDistXZ = 1.5;
            for (let i = hazards.length - 1; i >= 0; i--) {
                const haz = hazards[i];
                
                // Spin hazard ring
                haz.children[0].rotation.z += delta * 2;
                
                // Check XZ distance
                const dx = ufoGroup.position.x - haz.position.x;
                const dz = ufoGroup.position.z - haz.position.z;
                const distXZ = Math.sqrt(dx*dx + dz*dz);
                
                // If close horizontally, check if UFO jumped high enough
                if (distXZ < hazardCollideDistXZ) {
                    // Allow simple clearance: if UFO Y < 1.0, it gets sucked in
                    if (ufoGroup.position.y < 1.0) {
                        isGameOver = true;
                        document.getElementById('gameOver').style.display = 'block';
                    }
                }

                // Cleanup
                if (haz.position.z > ufoZPos + 20) {
                    scene.remove(haz);
                    hazards.splice(i, 1);
                }
            }

            // Update environments relative to the UFO
            stars.position.z = ufoZPos;
            gridHelper.position.z = ufoZPos - (ufoZPos % (200 / 40)); 

            // Update Camera to follow
            camera.position.x = ufoGroup.position.x * 0.5;
            camera.position.y = ufoGroup.position.y + camOffset.y;
            camera.position.z = ufoGroup.position.z + camOffset.z;
            camera.lookAt(ufoGroup.position.x, ufoGroup.position.y, ufoGroup.position.z - 10);

            // Give the UFO a hover spin effect
            ufoGroup.rotation.y -= delta;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
